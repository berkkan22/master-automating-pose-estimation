# COCO8-pose dataset (first 8 images from COCO train2017) by Ultralytics
# Documentation: https://docs.ultralytics.com/datasets/pose/coco8-pose/
# Example usage: yolo train data=coco8-pose.yaml
# parent
# ├── ultralytics
# └── datasets
#     └── coco8-pose  ← downloads here (1 MB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: trudi_ds_yolo11_instand_segmentation # dataset root dir
train: train/images # train images (relative to 'path') 4 images
val: val/images # val images (relative to 'path') 4 images
# test: # test images (optional)

# Classes
names:
  # 0: container
  # 1: freight_car # we only have 2 of them in the training dataset
  # 2: semi_trailer # we dont have them in the training dataset
  # 3: tank_container
  # 4: trailer
  0: container
  1: trailer
  2: tank_container
# Download script/URL (optional)
# download: https://github.com/ultralytics/assets/releases/download/v0.0.0/coco8-pose.zip
